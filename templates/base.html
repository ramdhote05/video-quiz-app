<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Video Summarizer & Quiz{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="shell">
    <header class="site-header">
      <h1>Lecture<span>Recap</span></h1>
      <div class="tag">video &rarr; transcript &rarr; summary &rarr; quiz</div>
    </header>
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
